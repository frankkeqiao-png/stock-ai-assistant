<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>交易助理 v0.1</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #667085;
      --red: #c2410c;
      --green: #047857;
      --blue: #1d4ed8;
      --yellow: #92400e;
      --shadow: 0 8px 22px rgba(15, 23, 42, .07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }
    .app { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: #101828;
      color: #eef2ff;
      padding: 18px 14px;
    }
    .brand { padding: 8px 10px 14px; border-bottom: 1px solid rgba(255,255,255,.14); margin-bottom: 12px; }
    .brand h1 { margin: 0 0 6px; font-size: 19px; }
    .brand p { margin: 0; color: #b9c3d6; font-size: 12px; }
    nav button {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 8px;
      color: #dce7ff;
      background: transparent;
      text-align: left;
      padding: 9px 10px;
      margin: 4px 0;
      cursor: pointer;
      font: inherit;
    }
    nav button.active, nav button:hover { background: rgba(255,255,255,.12); color: #fff; }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(245,247,251,.95);
      backdrop-filter: blur(8px);
    }
    h2 { margin: 0; font-size: 20px; }
    .meta { color: var(--muted); font-size: 12px; }
    .content { padding: 22px; }
    .grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; }
    .card {
      grid-column: span 4;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    h3 { margin: 0 0 10px; font-size: 15px; }
    .note { color: var(--muted); font-size: 13px; }
    .metric { font-size: 28px; font-weight: 750; margin: 4px 0; }
    .btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 8px;
      padding: 8px 11px;
      cursor: pointer;
      font: inherit;
    }
    .btn.primary { background: #111827; color: #fff; border-color: #111827; }
    .btn.danger { color: #991b1b; border-color: #fecaca; background: #fff7f7; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: #eef2ff;
      color: var(--blue);
      white-space: nowrap;
    }
    .pill.red { color: #be123c; background: #fff1f2; }
    .pill.green { color: var(--green); background: #ecfdf5; }
    .pill.yellow { color: var(--yellow); background: #fffbeb; }
    .up { color: var(--red); font-weight: 650; }
    .down { color: var(--green); font-weight: 650; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px 7px; text-align: left; vertical-align: top; }
    th { background: #f8fafc; color: #475467; font-weight: 650; }
    tr:last-child td { border-bottom: 0; }
    .scroll { overflow: auto; max-height: 520px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
    }
    .item strong { display: block; margin-bottom: 4px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kv { display: grid; grid-template-columns: 120px 1fr; gap: 7px 10px; }
    .kv div:nth-child(odd) { color: #475467; font-weight: 650; }
    details summary { cursor: pointer; }
    .tracking-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .tracking-row summary {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      list-style: none;
    }
    .tracking-row summary::-webkit-details-marker { display: none; }
    .tracking-row[open] summary { border-bottom: 1px solid var(--line); background: #f8fafc; }
    .tracking-row.stopped { opacity: .58; background: #f3f4f6; }
    .tracking-row.stopped summary { background: #f3f4f6; }
    .tracking-body { padding: 12px; }
    .tracking-chart { margin-top: 10px; }
    pre {
      max-height: 520px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 70px; resize: vertical; }
    label { display: grid; gap: 5px; color: #475467; font-size: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: end; }
    .wide { grid-column: span 2; }
    .error {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #991b1b;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
    }
    .status-banner {
      margin: 10px 0 0;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      display: none;
      white-space: pre-wrap;
    }
    .status-banner details { white-space: normal; }
    .status-banner summary { cursor: pointer; font-weight: 650; }
    .status-banner pre {
      margin: 8px 0 0;
      max-height: 260px;
      background: transparent;
      color: inherit;
      border-radius: 0;
      padding: 0;
      font: inherit;
      white-space: pre-wrap;
    }
    .status-banner.show { display: block; }
    .status-banner.success { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
    .status-banner.error-state { border-color: #fecaca; background: #fff1f2; color: #991b1b; }
    .status-banner.running { border-color: #fde68a; background: #fffbeb; color: #92400e; }
    .status-banner.warning { border-color: #fde68a; background: #fffbeb; color: #92400e; }
    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; }
      .card, .span-8, .span-6 { grid-column: span 12; }
      .two, .form-grid { grid-template-columns: 1fr; }
      .wide { grid-column: span 1; }
      .tracking-row summary { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>交易助理</h1>
        <p>推荐、参考、分析、交易计划</p>
      </div>
      <nav id="nav"></nav>
    </aside>
    <main>
      <header>
        <div>
          <h2 id="pageTitle">今日行动清单</h2>
          <div class="meta" id="meta">等待数据</div>
          <div class="status-banner" id="refreshStatus"></div>
        </div>
        <div class="actions">
          <button class="btn primary" id="refreshBtn">刷新真实数据</button>
          <button class="btn" id="reloadBtn">重新载入</button>
        </div>
      </header>
      <section class="content" id="app"></section>
    </main>
  </div>

  <script src="data/trading-assistant.js"></script>
  <script>
    const pages = [
      ["overview", "01 今日行动清单"],
      ["pool", "02 候选股票"],
      ["trigger", "03 买卖点触发"],
      ["plans", "04 交易计划"],
      ["review", "05 数据复盘"],
      ["continuity", "06 剔除确认"],
      ["tracking", "07 推荐追踪"],
      ["raw", "08 全量数据"]
    ];

    let data = null;
    let current = "overview";

    const $ = id => document.getElementById(id);
    const isLocalRuntime = location.protocol === "http:" && /^(127\.0\.0\.1|localhost)(:8765)?$/.test(location.host);
    const localApiOrigin = isLocalRuntime ? "" : null;
    const apiUrl = path => `${localApiOrigin}${path}`;
    const fmt = v => v === null || v === undefined || v === "" ? "缺失" : v;
    const clsPct = v => Number(v) > 0 ? "up" : Number(v) < 0 ? "down" : "";
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const formatRefreshTime = value => {
      const text = String(value || "");
      const match = text.match(/(\d{4})[/-](\d{1,2})[/-](\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
      if (match) {
        const [, y, m, d, h, min] = match;
        return `${y}年${m.padStart(2, "0")}月${d.padStart(2, "0")}日 ${h.padStart(2, "0")}:${min.padStart(2, "0")}`;
      }
      const date = new Date(value);
      if (!Number.isNaN(date.getTime())) {
        const parts = new Intl.DateTimeFormat("zh-CN", {
          timeZone: "Asia/Shanghai",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(date).reduce((acc, part) => {
          acc[part.type] = part.value;
          return acc;
        }, {});
        return `${parts.year}年${parts.month}月${parts.day}日 ${parts.hour}:${parts.minute}`;
      }
      return "缺失";
    };
    const setRefreshStatus = (type, message) => {
      const el = $("refreshStatus");
      if (!el) return;
      el.className = `status-banner show ${type || ""}`;
      el.textContent = message || "";
    };
    const setCollapsibleRefreshStatus = (type, summary, detail) => {
      const el = $("refreshStatus");
      if (!el) return;
      el.className = `status-banner show ${type || ""}`;
      el.innerHTML = `<details><summary>${esc(summary)}</summary><pre>${esc(detail || "")}</pre></details>`;
    };
    const clearRefreshStatus = () => {
      const el = $("refreshStatus");
      if (!el) return;
      el.className = "status-banner";
      el.textContent = "";
    };
    const refreshFailureText = () => {
      const failures = data?.audit?.failures || [];
      if (!failures.length) return "失败源 0 个。";
      return `失败源 ${failures.length} 个：\n${failures.map((item, index) => {
        const recovery = failureRecoveryText(item);
        return `${index + 1}. ${item.name}${item.error ? `：${item.error}` : ""}${recovery ? `\n   替代处理：${recovery}` : ""}`;
      }).join("\n")}`;
    };
    const failureRecoveryText = item => {
      const name = String(item?.name || "");
      const method = data?.universe?.method || "";
      const unavailable = data?.dataQuality?.unavailable || [];
      const boardQuality = unavailable.find(x => String(x.field || "").includes("新浪板块"));
      const hasSinaBoards = (data?.universe?.boards || []).some(board => String(board.source || "").includes("新浪财经"));
      if (name.includes("东方财富行业板块") || name.includes("东方财富概念板块") || name.includes("东方财富科技/能源板块股票池")) {
        if (hasSinaBoards || method.includes("新浪财经")) {
          const quality = boardQuality ? `；影响：${boardQuality.impact}` : "";
          return `已用新浪财经行业/概念节点补齐板块股票池。${method}${quality}`;
        }
        return "未找到可用板块替代源；本次将使用缓存或备用观察池，具体影响见数据审计页。";
      }
      if (name.includes("K线") && (data?.sources || []).some(s => String(s.name || "").includes("新浪财经K线备用源") || String(s.name || "").includes("腾讯证券K线第二备用源"))) {
        return "已配置新浪财经K线备用源和腾讯证券K线第二备用源；个股级别是否补齐见数据审计页K线覆盖。";
      }
      if (name.includes("公告") && (data?.sources || []).some(s => String(s.name || "").includes("巨潮资讯公告备用源"))) {
        return "已配置巨潮资讯公告备用源；个股公告覆盖见数据审计页。";
      }
      if (name.includes("资金流") && (data?.sources || []).some(s => String(s.name || "").includes("新浪资金流备用源"))) {
        return "已配置新浪资金流备用源；若仍无法匹配，资金流不参与加分或扣分，并在个股资金栏显性标注。";
      }
      return "";
    };
    const showSnapshotFailureStatus = () => {
      const failures = data?.audit?.failures || [];
      if (!failures.length) return;
      const completedAt = formatRefreshTime(data.generatedAtChina || data.generatedAt || "");
      setCollapsibleRefreshStatus(
        "warning",
        `最近一次自动更新：${completedAt}，失败源 ${failures.length} 个，点击展开查看替代方案`,
        `自动刷新已完成，但存在部分数据源失败；下面列出失败源、替代方案和补齐影响。\n${refreshFailureText()}`
      );
    };
    const list = arr => (arr && arr.length ? arr.map(x => `<li>${esc(x)}</li>`).join("") : "<li>无</li>");
    const moneyFlowCell = c => {
      const flow = c.capitalFlow || {};
      if (c.mainNetInflowYi === null || c.mainNetInflowYi === undefined) {
        return `<span class="note">资金流缺失</span><br><span class="note">${esc(flow.reason || "公开资金流源未返回；本项不加分也不扣分")}</span>`;
      }
      const pct = flow.mainNetInflowPct === null || flow.mainNetInflowPct === undefined ? "" : ` / 占比 ${fmt(flow.mainNetInflowPct)}%`;
      return `<span class="${clsPct(c.mainNetInflowYi)}">${fmt(c.mainNetInflowYi)}亿</span><br><span class="note">${esc(flow.source || "资金流")} ${esc(flow.date || "")}${esc(pct)}</span>`;
    };
    const trackingChart = record => {
      const points = (record.priceHistory || []).filter(p => Number.isFinite(Number(p.close)));
      const first = Number(record.firstPrice);
      if (!first || points.length < 1) return `<div class="note">暂无走势点</div>`;
      const returns = points.map(p => ({ ...p, r: (Number(p.close) / first - 1) * 100 }));
      const values = returns.map(p => p.r);
      const min = Math.min(-5, ...values);
      const max = Math.max(5, ...values);
      const width = 520;
      const height = 150;
      const pad = 18;
      const x = i => pad + (returns.length === 1 ? 0 : i * (width - pad * 2) / (returns.length - 1));
      const y = v => height - pad - ((v - min) / (max - min || 1)) * (height - pad * 2);
      const path = returns.map((p, i) => `${i ? "L" : "M"}${roundSvg(x(i))},${roundSvg(y(p.r))}`).join(" ");
      const zeroY = roundSvg(y(0));
      const last = returns[returns.length - 1];
      const color = last.r >= 0 ? "#b42318" : "#0f8b4c";
      return `<svg viewBox="0 0 ${width} ${height}" role="img" style="width:100%;max-width:560px;height:160px;border:1px solid #d9e0ea;border-radius:8px;background:#fff">
        <line x1="${pad}" y1="${zeroY}" x2="${width - pad}" y2="${zeroY}" stroke="#94a3b8" stroke-dasharray="4 4" />
        <path d="${path}" fill="none" stroke="${color}" stroke-width="2.4" />
        ${returns.map((p, i) => `<circle cx="${roundSvg(x(i))}" cy="${roundSvg(y(p.r))}" r="2.8" fill="${color}"><title>${esc(p.date)} ${roundSvg(p.r)}%</title></circle>`).join("")}
        <text x="${pad}" y="14" fill="#64748b" font-size="11">收益 ${roundSvg(min)}% 至 ${roundSvg(max)}%</text>
        <text x="${width - pad - 120}" y="${Math.max(14, y(last.r) - 6)}" fill="${color}" font-size="12">最新 ${roundSvg(last.r)}%</text>
      </svg>`;
    };
    const roundSvg = v => Number(Number(v).toFixed(2));
    const trackingDays = record => {
      const end = record.performance?.latestDate || record.priceHistory?.at(-1)?.date || "";
      if (!record.firstDate || !end) return "缺失";
      const startDate = new Date(`${record.firstDate}T00:00:00+08:00`);
      const endDate = new Date(`${end}T00:00:00+08:00`);
      if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return "缺失";
      return `${Math.max(0, Math.round((endDate - startDate) / 86400000)) + 1}天`;
    };
    const pill = state => {
      const type = state === "交易准备池" ? "green" : state === "重点跟踪池" ? "yellow" : state === "暂不交易" ? "red" : "";
      return `<span class="pill ${type}">${esc(state)}</span>`;
    };
    const stabilityPill = candidate => {
      const layer = candidate?.stability?.layer || candidate?.tradePlan?.trackingLayer || "候选观察池";
      const type = layer === "核心跟踪池" ? "green" : layer === "今日机会池" ? "yellow" : layer === "待确认剔除" || layer === "暂不交易" ? "red" : "";
      return `<span class="pill ${type}">${esc(layer)}</span>`;
    };
    const sectorGroups = () => (data.candidateGroups || []).map(g => ({
      ...g,
      rows: g.candidates.map(code => data.candidates.find(c => c.code === code)).filter(Boolean)
    })).filter(g => g.rows.length);
    const sectorTitle = g => `${esc(g.name)} <span class="pill">${g.rows.length}只</span>`;
    const detailsCard = (title, body, span = "span-12") => `
      <div class="card ${span}">
        <details>
          <summary><strong>${esc(title)}</strong></summary>
          <div style="margin-top:10px">${body}</div>
        </details>
      </div>`;
    const reviewTimelineSection = (title, rows) => `
      <details class="tracking-row">
        <summary>
          <div><strong>${esc(title)}</strong><br><span class="note">${fmt(rows?.length || 0)} 条记录</span></div>
          <div>最近<br><strong>${esc(rows?.[0]?.key || "暂无")}</strong></div>
          <div>刷新次数<br><strong>${fmt((rows || []).reduce((sum, row) => sum + Number(row.refreshCount || 0), 0))}</strong></div>
          <div></div><div></div><div><span class="pill">点击展开</span></div>
        </summary>
        <div class="tracking-body">
          ${(rows || []).length ? rows.map(reviewTimelineItem).join("") : `<div class="item">暂无${esc(title)}复盘记录。</div>`}
        </div>
      </details>`;
    const reviewTimelineItem = row => `
      <details class="tracking-row">
        <summary>
          <div><strong>${esc(row.key)}</strong><br><span class="note">${esc(formatRefreshTime(row.latestRefresh || row.firstRefresh || ""))}</span></div>
          <div>刷新<br><strong>${fmt(row.refreshCount)} 次</strong></div>
          <div>候选<br><strong>${fmt(row.candidateCount)}</strong></div>
          <div>均值<br><strong>${fmt(row.avgCandidateCount)}</strong></div>
          <div>缺失项<br><strong>${fmt((row.dataQuality || []).length)}</strong></div>
          <div><span class="pill">详情</span></div>
        </summary>
        <div class="tracking-body">
          <div class="kv">
            <div>首次刷新</div><div>${esc(formatRefreshTime(row.firstRefresh || ""))}</div>
            <div>最近刷新</div><div>${esc(formatRefreshTime(row.latestRefresh || ""))}</div>
            <div>状态分布</div><div>${esc(Object.entries(row.states || {}).map(([k, v]) => `${k} ${v}`).join("；") || "无")}</div>
            <div>平均状态</div><div>${esc(Object.entries(row.stateAverages || {}).map(([k, v]) => `${k} ${v}`).join("；") || "无")}</div>
            <div>板块分布</div><div>${esc((row.groups || []).map(g => `${g.name} ${g.count}`).join("；") || "无")}</div>
          </div>
          <div class="two" style="margin-top:10px">
            <div><strong>高分候选</strong><ul>${list((row.topCandidates || []).map(c => `${c.name} ${c.code}：${c.focusArea || ""} / ${c.state || ""} / 评分${fmt(c.score)} / ${c.buyType || ""} / 风险收益比${fmt(c.riskReward)}`))}</ul></div>
            <div><strong>数据限制</strong><ul>${list((row.dataQuality || []).map(x => `${x.field}：${x.reason || ""}；${x.impact || ""}`))}</ul></div>
          </div>
        </div>
      </details>`;

    function renderNav() {
      $("nav").innerHTML = pages.map(([id, name]) =>
        `<button class="${id === current ? "active" : ""}" data-id="${id}">${name}</button>`
      ).join("");
      document.querySelectorAll("nav button").forEach(btn => {
        btn.onclick = () => {
          current = btn.dataset.id;
          render();
        };
      });
    }

    async function loadData() {
      if (!isLocalRuntime && window.TRADING_ASSISTANT_DATA) {
        data = JSON.parse(JSON.stringify(window.TRADING_ASSISTANT_DATA));
        data.loadSource = "GitHub Pages 静态快照 data/trading-assistant.js";
        data.loadWarning = "";
        return;
      }
      try {
        const res = await fetch(apiUrl("/api/snapshot?_=" + Date.now()));
        if (!res.ok) throw new Error(await res.text());
        data = await res.json();
        data.loadSource = "本地服务接口 /api/snapshot";
      } catch (error) {
        if (window.TRADING_ASSISTANT_DATA) {
          data = JSON.parse(JSON.stringify(window.TRADING_ASSISTANT_DATA));
          data.loadSource = "静态快照 data/trading-assistant.js";

        throw new Error(`接口和静态快照都无法加载。请使用 http://127.0.0.1:8765/ 打开页面。原始错误：${error.message || error}`);

    async function refreshData() {
      if (!isLocalRuntime) {
        $("refreshBtn").disabled = true;
        $("refreshBtn").textContent = "重新读取中...";
        setRefreshStatus("running", "GitHub Pages 静态模式：页面按钮只会重新读取已发布的最新数据；真正的数据刷新由 GitHub Actions 定时或手动运行。");
        try {
          const res = await fetch(`data/trading-assistant.json?_=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) throw new Error(await res.text());
          data = await res.json();
          data.loadSource = "GitHub Pages 静态数据 data/trading-assistant.json";
          const completedAt = formatRefreshTime(data.generatedAtChina || data.generatedAt || new Date().toISOString());
          setCollapsibleRefreshStatus(
            "success",
            `已重新读取最新发布数据：${completedAt}，候选股 ${data.candidates.length} 只，失败源 ${(data.audit?.failures || []).length} 个`,
            `推荐追踪 active ${data.recommendationTracking?.active ?? "缺失"} 只。\n${refreshFailureText()}`
          );
          render();
        } catch (error) {
          setRefreshStatus("error-state", `重新读取已发布数据失败：${error.message || error}`);
        } finally {
          $("refreshBtn").disabled = false;
          $("refreshBtn").textContent = "重新读取最新数据";
        }
        return;
      }
      $("refreshBtn").disabled = true;
      $("refreshBtn").textContent = "启动刷新...";
      setRefreshStatus("running", "刷新已启动，正在获取最新行情、资金流、财报、公告和推荐追踪数据。");
      try {
        const res = await fetch(apiUrl("/api/refresh"), { method: "POST" });
        const text = await res.text();
        let body = {};
        try {
          body = text ? JSON.parse(text) : {};
        } catch {
          throw new Error(`刷新接口没有返回有效 JSON。请确认使用的是 http://127.0.0.1:8765/，不要用静态文件方式打开。响应：${text.slice(0, 180)}`);
        }
        if (!res.ok || !body.ok) throw new Error(body.error || "刷新启动失败");
        const status = await waitForRefreshDone();
        await loadData();
        const completedAt = formatRefreshTime(data.generatedAtChina || data.generatedAt || status.lastRefresh || new Date().toISOString());
        setCollapsibleRefreshStatus(
          "success",
          `刷新完成：${completedAt}，候选股 ${data.candidates.length} 只，失败源 ${(data.audit?.failures || []).length} 个`,
          `推荐追踪 active ${data.recommendationTracking?.active ?? "缺失"} 只。\n${refreshFailureText()}`
        );
        render();
      } catch (error) {
        const previous = $("app").innerHTML;
        let detail = "";
        try {
          const statusRes = await fetch(apiUrl("/api/status?_=" + Date.now()));
          if (statusRes.ok) {
            const status = await statusRes.json();
            detail = status.lastRefreshOutput ? `\n最近输出：${status.lastRefreshOutput}` : "";
          }
        } catch {}
        setRefreshStatus("error-state", `刷新失败：${error.message || error}${detail}`);
        $("app").innerHTML = `<div class="error">刷新失败：${esc(error.message || error)}</div>${previous}`;
      } finally {
        $("refreshBtn").disabled = false;
        $("refreshBtn").textContent = "刷新真实数据";
      }
    }

    async function waitForRefreshDone() {
      const started = Date.now();
      while (Date.now() - started < 13 * 60 * 1000) {
        const elapsed = Math.floor((Date.now() - started) / 1000);
        $("refreshBtn").textContent = `刷新中 ${elapsed}s`;
        setRefreshStatus("running", `刷新中：已运行 ${elapsed}s。\n正在后台更新数据，完成或失败后会在这里显示结果。`);
        const res = await fetch(apiUrl("/api/status?_=" + Date.now()));
        if (!res.ok) throw new Error(await res.text());
        const status = await res.json();
        if (!status.refreshing) {
          if (status.lastRefreshError) throw new Error(status.lastRefreshError);
          return status;
        }
        await new Promise(resolve => setTimeout(resolve, 3000));
      }
      throw new Error("刷新超过13分钟仍未完成，请稍后点“重新载入”查看是否已有新快照。");
    }

    async function decideRemoval(action, item) {
      if (!isLocalRuntime) {
        setRefreshStatus("error-state", "GitHub Pages 静态模式不能写入剔除确认；请在本地版本处理确认后再推送到 GitHub。");
        return;
      }
      const endpoint = action === "confirm" ? "/api/removal/confirm" : "/api/removal/keep";
      const res = await fetch(apiUrl(endpoint), {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(item)
      });
      const text = await res.text();
      let body = {};
      try { body = text ? JSON.parse(text) : {}; } catch { body = {}; }
      if (!res.ok || body.ok === false) throw new Error(body.error || text || "候选股票确认失败");
      await loadData();
      current = "continuity";
      render();
      setRefreshStatus(body.cloudSync?.ok ? "success" : "error-state", durableStateSyncText(body.cloudSync, "候选股票状态已在本地更新"));
    }

    async function confirmStrategyUpgrade(item) {
      if (!isLocalRuntime) {
        setRefreshStatus("error-state", "GitHub Pages 静态模式不能写入策略升级确认；请在本地版本点击确认升级，确认后再推送到 GitHub。");
        return;
      }
      const { res, body, text } = await postJsonWithTimeout(apiUrl("/api/strategy/confirm-upgrade"), item, 75000);
      if (!res.ok || body.ok === false) throw new Error(body.error || text || "策略升级执行失败");
      await loadData();
      current = "review";
      render();
      setRefreshStatus(body.cloudSync?.ok ? "success" : "error-state", `策略升级已执行：${item.title}\n${body.message || "执行成功，代码策略状态已生效。"}\n${durableStateSyncText(body.cloudSync, "策略状态已在本地更新")}`);
    }

    async function postJsonWithTimeout(url, item, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(item),
          signal: controller.signal
        });
        const text = await res.text();
        let body = {};
        try { body = text ? JSON.parse(text) : {}; } catch { body = {}; }
        return { res, body, text };
      } catch (error) {
        if (error.name === "AbortError") throw new Error("请求超过30秒未返回，已取消。请确认本地服务是否仍在运行。");
        throw error;
      } finally {
        clearTimeout(timer);
      }
    }

    async function rollbackStrategyUpgrade(item) {
      if (!isLocalRuntime) {
        setRefreshStatus("error-state", "GitHub Pages 静态模式不能写入策略升级回退；请在本地版本处理后再推送到 GitHub。");
        return;
      }
      const { res, body, text } = await postJsonWithTimeout(apiUrl("/api/strategy/rollback-upgrade"), item, 75000);
      if (!res.ok || body.ok === false) throw new Error(body.error || text || "策略升级回退失败");
      await loadData();
      current = "review";
      render();
      setRefreshStatus(body.cloudSync?.ok ? "success" : "error-state", `策略升级已回退：${item.title}\n${body.message || "回退成功，已恢复原有策略状态。"}\n${durableStateSyncText(body.cloudSync, "策略状态已在本地更新")}`);
    }

    function durableStateSyncText(sync, localMessage) {
      if (!sync) return `${localMessage}；云端同步状态未知。`;
      if (sync.ok && sync.published) return `${localMessage}；完整业务状态已同步到 GitHub，线上将在自动部署后更新。`;
      if (sync.ok) return `${localMessage}；云端状态已是最新，无需重复提交。`;
      return `${localMessage}；云端同步失败，尚未影响本地结果。原因：${sync.error || "未知"}`;
    }

              </div>

                <div><strong>通过策略</strong><ul>${list((c.tradePlan.strategyVotes?.passed || []).slice(0, 6))}</ul></div>
                <div><strong>否决/观察策略</strong><ul>${list([...(c.tradePlan.strategyVotes?.failed || []), ...(c.tradePlan.strategyVotes?.neutral || [])].slice(0, 6))}</ul></div>
              </div>
              <p class="note">${esc(c.tradePlan.caveat)}</p>
            </div>`).join("")}
          `).join("")}
        </div>`;
    }

    function review() {
      const c = data.audit.coverage;
      const sr = data.strategyReview || {};
      const timeline = sr.timeline || {};
      const confirmedUpgrades = data.strategyUpgradeState?.confirmed || sr.confirmedUpgrades || [];
      const confirmedUpgradeFor = item => confirmedUpgrades.find(record => record.title === item.title || (record.upgradeKey && record.upgradeKey === item.upgradeKey));
      return `
        <div class="grid">
          ${detailsCard("数据覆盖", `
            <div class="kv">
              <div>板块数</div><div>${fmt(c.boards)}</div>
              <div>股票池</div><div>${fmt(c.universeStocks)}</div>
              <div>候选股</div><div>${fmt(c.candidates)}</div>
              <div>日K</div><div>${fmt(c.withDailyK)} / ${fmt(c.candidates)}</div>
              <div>30分钟K</div><div>${fmt(c.with30mK)} / ${fmt(c.candidates)}</div>
              <div>5分钟K</div><div>${fmt(c.with5mK)} / ${fmt(c.candidates)}</div>
              <div>财报</div><div>${fmt(c.withFinancial)} / ${fmt(c.candidates)}</div>
              <div>公告</div><div>${fmt(c.withAnnouncements)} / ${fmt(c.candidates)}</div>
              <div>失败源</div><div>${fmt(c.failures)}</div>
            </div>
          `, "span-12")}
          ${detailsCard("数据来源", `
            <ul>${list(data.sources.map(s => `${s.name}：${s.url}`))}</ul>
          `, "span-12")}
          ${detailsCard("源状态", `
            <div class="scroll">
              <table><thead><tr><th>来源</th><th>状态</th><th>错误</th></tr></thead><tbody>
                ${data.audit.sources.map(s => `<tr><td>${esc(s.name)}</td><td>${s.ok ? '<span class="pill green">可用</span>' : '<span class="pill red">失败</span>'}</td><td>${esc(s.error || "")}</td></tr>`).join("")}
              </tbody></table>
            </div>
          `, "span-12")}
          ${detailsCard("无法填充的数据", `
            ${(data.dataQuality?.unavailable || []).length ? `
              <table><thead><tr><th>字段</th><th>影响范围</th><th>原因</th><th>处理方式</th></tr></thead><tbody>
                ${data.dataQuality.unavailable.map(x => `<tr><td>${esc(x.field)}</td><td>${fmt(x.count)} / ${fmt(x.total)}</td><td>${esc(x.reason)}</td><td>${esc(x.impact)}</td></tr>`).join("")}
              </tbody></table>
            ` : `<div class="item">当前核心展示字段均已填充。</div>`}
          `, "span-12")}
          <div class="card span-12">
            <h3>策略自我复盘机制</h3>
            <div class="kv">
              <div>复盘状态</div><div>${esc(sr.reviewMode || "样本积累期")}</div>
              <div>日志样本</div><div>${fmt(sr.sampleCount)} 次刷新</div>
              <div>本次刷新</div><div>${esc(formatRefreshTime(sr.generatedAtChina || data.generatedAtChina || data.generatedAt))}</div>
            </div>
            <div class="two" style="margin-top:10px">
              <div><strong>复盘节奏</strong><ul>${list(sr.cadence || [])}</ul></div>
              <div><strong>策略护栏</strong><ul>${list(sr.guardrails || [])}</ul></div>
            </div>
          </div>
          ${detailsCard("分层表现基线", `
            <div class="scroll">
              <table>
                <thead><tr><th>状态</th><th>数量</th><th>平均评分</th><th>平均风险收益比</th><th>平均候选池RPS</th></tr></thead>
                <tbody>${Object.entries(sr.stateMetrics || {}).map(([state, m]) => `<tr>
                  <td>${esc(state)}</td>
                  <td>${fmt(m.count)}</td>
                  <td>${fmt(m.avgScore)}</td>
                  <td>${fmt(m.avgRiskReward)}</td>
                  <td>${fmt(m.avgRelativeStrength)}</td>
                </tr>`).join("") || `<tr><td colspan="5">暂无复盘指标</td></tr>`}</tbody>
              </table>
            </div>
          `, "span-12")}
          ${detailsCard("本次观察", `
            <ul>${list(sr.observations || [])}</ul>
          `, "span-12")}
          <div class="card span-12">
            <h3>日 / 周 / 月复盘</h3>
            <p class="note">按日期倒序排列。日复盘展示每次刷新记录；周复盘和月复盘按周期聚合刷新次数、候选池、状态分布、高分候选和数据限制。</p>
            ${reviewTimelineSection("日复盘", timeline.daily || [])}
            ${reviewTimelineSection("周复盘", timeline.weekly || [])}
            ${reviewTimelineSection("月复盘", timeline.monthly || [])}
          </div>
          <div class="card span-6">
            <h3>策略升级确认</h3>
            <p class="note">复盘只生成建议。点击“确认升级”后，系统必须执行对应升级处理器；执行成功才显示已升级，执行失败会返回错误。已升级后可点击“升级回退”恢复原策略状态。</p>
            ${(sr.suggestions || []).length ? (sr.suggestions || []).map((item, index) => {
              const confirmed = confirmedUpgradeFor(item);
              const upgradeId = confirmed?.id || `${sr.generatedAtChina || data.generatedAtChina || "review"}-${index}`;
              return `
              <div class="item">
                <strong>${esc(item.title)}</strong>
                <div class="note">列出日期：${esc(formatRefreshTime(sr.generatedAtChina || data.generatedAtChina || data.generatedAt).slice(0, 11))}</div>
                <div><strong>为什么需要升级：</strong>${esc(item.reason)}</div>
                <div class="note"><strong>建议怎么改：</strong>${esc(item.proposedChange)}</div>
                <div style="margin:8px 0">${confirmed ? `<span class="pill green">已升级</span> <span class="note">执行时间：${esc(formatRefreshTime(confirmed.decidedAt || ""))}</span>` : `<span class="pill yellow">${esc(item.status || "待你确认")}</span>`}</div>
                ${confirmed?.executionMessage ? `<div class="note"><strong>执行结果：</strong>${esc(confirmed.executionMessage)}</div>` : ""}
                <button class="btn ${confirmed ? "" : "primary"} strategy-upgrade-action"
                  data-action="${confirmed ? "rollback" : "confirm"}"
                  data-id="${esc(upgradeId)}"
                  data-upgrade-key="${esc(item.upgradeKey || "")}"
                  data-title="${esc(item.title)}"
                  data-reason="${esc(item.reason)}"
                  data-change="${esc(item.proposedChange)}"
                  data-refresh="${esc(sr.generatedAtChina || data.generatedAtChina || data.generatedAt || "")}">${confirmed ? "升级回退" : "确认升级"}</button>
                <div class="note" style="margin-top:6px">${isLocalRuntime ? (confirmed ? "点击后会执行回退处理器，成功后恢复为待确认。" : "点击后会执行升级处理器，成功后才写入已升级。") : "线上GitHub Pages为只读模式；请回到本地版本处理升级确认或回退。"}</div>
              </div>
            `}).join("") : `<div class="item">暂无需要升级的策略建议。</div>`}
          </div>
        </div>`;
    }

    function continuity() {
      const c = data.continuity || {};
      const pending = c.pendingRemovals || [];
      const retained = c.retainedByUser || [];
      const confirmed = c.confirmedRemoved || [];
      return `
        <div class="grid">
          <div class="card span-12">
            <h3>候选池连续性与剔除确认</h3>
            <p class="note">每天刷新后，系统会对比上一轮候选池。本次未再进入候选池的股票不会直接删除，会先进入拟剔除清单；你确认后才写入剔除记录。若选择继续跟踪，后续刷新会保留并重新分析。</p>
            <div class="kv">
              <div>上次刷新</div><div>${esc(formatRefreshTime(c.previousRefresh || ""))}</div>
              <div>待确认剔除</div><div>${fmt(c.pendingRemovalCount || 0)} 只</div>
              <div>已确认剔除记录</div><div>${fmt(c.confirmedRemovedCount || 0)} 只</div>
              <div>继续跟踪</div><div>${fmt(retained.length)} 只</div>
            </div>
          </div>
          <div class="card span-12">
            <h3>待你确认的拟剔除股票</h3>
            ${pending.length ? `<div class="scroll"><table>
              <thead><tr><th>股票</th><th>上次状态</th><th>拟剔除理由</th><th>上次关键数据</th><th>操作</th></tr></thead>
              <tbody>${pending.map(item => `<tr>
                <td>${esc(item.name)}<br><span class="note">${esc(item.code)} / ${esc(item.previousSector || "")}</span></td>
                <td>${esc(item.previousState || "")}<br><span class="note">评分 ${fmt(item.previousScore)} / ${esc(item.previousBuyType || "")}</span></td>
                <td>${esc(item.reason)}<br><span class="note">${esc(item.nextStep || "")}</span></td>
                <td>价格 ${fmt(item.previousSnapshot?.price)} / 涨跌 ${fmt(item.previousSnapshot?.pct)}%<br>主力净流入 ${fmt(item.previousSnapshot?.mainNetInflowYi)}亿<br>止损 ${fmt(item.previousSnapshot?.stop)} / 止盈 ${fmt(item.previousSnapshot?.takeProfit)}</td>
                <td>
                  <button class="btn primary removal-action" data-action="confirm" data-code="${esc(item.code)}" data-name="${esc(item.name)}" data-reason="${esc(item.reason)}">确认剔除</button>
                  <button class="btn removal-action" data-action="keep" data-code="${esc(item.code)}" data-name="${esc(item.name)}" data-reason="${esc(item.reason)}">继续跟踪</button>
                </td>
              </tr>`).join("")}</tbody>
            </table></div>` : `<div class="item">当前没有待确认剔除股票。</div>`}
          </div>
          <div class="card span-6">
            <h3>继续跟踪池</h3>
            ${retained.length ? `<ul>${list(retained.map(item => `${item.name || ""} ${item.code}：${item.reason || "用户确认继续跟踪"}`))}</ul>` : `<div class="item">暂无手动保留股票。</div>`}
          </div>
          <div class="card span-6">
            <h3>已确认剔除</h3>
            ${confirmed.length ? `<ul>${list(confirmed.slice(-12).map(item => `${item.name || ""} ${item.code}：${formatRefreshTime(item.decidedAt || "")}`))}</ul>` : `<div class="item">暂无已确认剔除记录。</div>`}
          </div>
        </div>`;
    }

    function tracking() {
      const t = data.recommendationTracking || {};
      const records = [...(t.records || [])].sort((a, b) => {
        if (a.active !== b.active) return a.active ? -1 : 1;
        return String(b.lastSeenAtChina || b.firstDate || "").localeCompare(String(a.lastSeenAtChina || a.firstDate || ""));
      });
      const calendarEntries = Object.entries(t.calendar || {}).slice(0, 30);
      const perfClass = v => v === null || v === undefined ? "" : clsPct(v);
      return `
        <div class="grid">
          <div class="card span-12">
            <h3>推荐追踪</h3>
            <p class="note">这里记录系统历史推荐过的候选股，从首次推荐日起持续记录价格、状态、评分和交易计划表现。确认剔除后停止更新，但历史记录保留，用于检查推荐准确性和后续策略调整。</p>
            <div class="kv">
              <div>追踪股票</div><div>${fmt(t.total || 0)} 只</div>
              <div>持续追踪</div><div>${fmt(t.active || 0)} 只</div>
              <div>已停止</div><div>${fmt(t.stopped || 0)} 只</div>
              <div>最近更新</div><div>${esc(formatRefreshTime(t.updatedAtChina || data.generatedAtChina || ""))}</div>
            </div>
          </div>
          <div class="card span-12">
            <h3>推荐日历</h3>
            ${calendarEntries.length ? `<div class="scroll"><table>
              <thead><tr><th>日期</th><th>当日推荐/跟踪股票</th></tr></thead>
              <tbody>${calendarEntries.map(([date, codes]) => `<tr>
                <td>${esc(date)}</td>
                <td>${(codes || []).map(code => {
                  const r = records.find(x => x.code === code);
                  return r ? `${esc(r.name)} ${esc(code)}` : esc(code);
                }).join("、")}</td>
              </tr>`).join("")}</tbody>
            </table></div>` : `<div class="item">暂无推荐日历记录。</div>`}
          </div>
          <div class="card span-12">
            <h3>推荐股票追踪列表</h3>
            <p class="note">默认折叠为一行；展开后显示从首次推荐日至当前查看日的走势曲线、收益、最大回撤、止损/止盈触发和推荐记录。确认剔除的股票置灰并排在最后。</p>
            ${records.map(r => {
              const p = r.performance || {};
              return `<details class="tracking-row ${r.active ? "" : "stopped"}">
                <summary>
                  <div><strong>${esc(r.name)} ${esc(r.code)}</strong><br><span class="note">${esc(r.sector || "")}</span></div>
                  <div>推荐日<br><strong>${esc(r.firstDate || "")}</strong></div>
                  <div>推荐价<br><strong>${fmt(r.firstPrice)}</strong></div>
                  <div>现价<br><strong>${fmt(p.latestClose ?? r.currentPrice)}</strong></div>
                  <div>累计<br><strong class="${perfClass(p.currentReturnPct)}">${fmt(p.currentReturnPct)}%</strong></div>
                  <div>${r.active ? '<span class="pill green">持续追踪</span>' : '<span class="pill red">已停止</span>'}</div>
                </summary>
                <div class="tracking-body">
                  <div class="kv">
                    <div>追踪区间</div><div>${esc(r.firstDate || "")} 至 ${esc(p.latestDate || "")}，共 ${trackingDays(r)}</div>
                    <div>首次状态</div><div>${esc(r.firstState || "")} / 评分 ${fmt(r.firstScore)}</div>
                    <div>最近状态</div><div>${esc(r.currentState || "")} / 评分 ${fmt(r.currentScore)}</div>
                    <div>累计表现</div><div class="${perfClass(p.currentReturnPct)}">${fmt(p.currentReturnPct)}%</div>
                    <div>最大涨幅</div><div class="${perfClass(p.maxGainPct)}">${fmt(p.maxGainPct)}%</div>
                    <div>最大回撤</div><div class="${perfClass(p.maxDrawdownPct)}">${fmt(p.maxDrawdownPct)}%</div>
                    <div>计划检验</div><div>${p.hitStop ? '<span class="pill red">触发止损价</span>' : '<span class="pill">未触发止损</span>'} ${p.hitTakeProfit ? '<span class="pill green">触及止盈观察</span>' : '<span class="pill">未触及止盈</span>'}</div>
                    <div>停止原因</div><div>${esc(r.stoppedReason || (r.active ? "仍在追踪" : "已停止"))}</div>
                  </div>
                  <div class="tracking-chart">${trackingChart(r)}</div>
                  <div class="two" style="margin-top:10px">
                    <div><strong>首次推荐理由</strong><ul>${list(r.firstReason || [])}</ul></div>
                    <div><strong>最近推荐记录</strong><ul>${list((r.recommendations || []).slice(-5).map(x => `${x.date} ${x.state} 评分${x.score} ${x.buyType || ""}`))}</ul></div>
                  </div>
                  <div class="kv" style="margin-top:10px">
                    <div>初始计划</div><div>${esc(r.initialPlan?.buyType || "")} / 建仓 ${esc(r.initialPlan?.entryZone || "")} / 止损 ${fmt(r.initialPlan?.stop)} / 止盈 ${fmt(r.initialPlan?.takeProfit)}</div>
                    <div>最新计划</div><div>${esc(r.lastPlan?.buyType || "")} / ${esc(r.lastPlan?.nextAction || "")}</div>
                  </div>
                </div>
              </details>`;
            }).join("") || `<div class="item">暂无追踪记录。</div>`}
          </div>
        </div>`;
    }

    function raw() {
      return `
        <div class="grid">
          <div class="card span-12">
            <h3>全量数据附录</h3>
            <p class="note">这里展示每只候选股当前快照中保存的完整结构化数据，包括行情、板块归因、资金流、财报摘要、公告、技术结构、趋势阶段、候选池RPS、策略投票和交易计划。未取得的数据会在“数据质量”里明确列出。</p>
            <div class="kv">
              <div>刷新时间</div><div>${esc(formatRefreshTime(data.generatedAtChina || data.generatedAt))}</div>
              <div>候选股</div><div>${fmt(data.candidates.length)}</div>
              <div>数据源</div><div>${esc((data.sources || []).map(s => s.name).join("、"))}</div>
            </div>
          </div>
          <div class="card span-12">
            <h3>数据质量</h3>
            ${(data.dataQuality?.unavailable || []).length ? `<table>
              <thead><tr><th>字段</th><th>数量</th><th>原因</th><th>影响</th></tr></thead>
              <tbody>${(data.dataQuality?.unavailable || []).map(item => `<tr>
                <td>${esc(item.field)}</td>
                <td>${fmt(item.count)} / ${fmt(item.total)}</td>
                <td>${esc(item.reason)}</td>
                <td>${esc(item.impact)}</td>
              </tr>`).join("")}</tbody>
            </table>` : `<p>候选股关键字段无缺失。</p>`}
          </div>
          ${sectorGroups().map(g => `
            <div class="card span-12"><h3>${sectorTitle(g)}</h3></div>
            ${g.rows.map(c => `
              <div class="card span-12">
                <details>
                  <summary><strong>${esc(c.name)} ${esc(c.code)}</strong> ${pill(c.tradePlan.state)} 评分 ${fmt(c.tradePlan.score)} 风险收益比 ${esc(c.tradePlan.riskReward?.text || "未计算")}</summary>
                  <pre>${esc(JSON.stringify(c, null, 2))}</pre>
                </details>
              </div>
            `).join("")}
          `).join("")}
        </div>`;
    }

    $("refreshBtn").onclick = refreshData;
    $("reloadBtn").onclick = async () => { await loadData(); render(); showSnapshotFailureStatus(); };

    (async function init() {
      try {
        await loadData();
      } catch (error) {
        data = null;
      }
      render();
      showSnapshotFailureStatus();
    })();
  </script>
</body>
</html>
